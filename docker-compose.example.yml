services:
  nginx:
    image: nginx:1.29-alpine
    ports:
      - 80:80
    volumes:
      - ./nginx.conf.example:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
      - tinyauth

  app:
    image: traefik/whoami:latest

  tinyauth:
    image: ghcr.io/maposia/remnawave-tinyauth:v5
    environment:
      - TINYAUTH_APPURL=https://tinyauth.example.com
      - TINYAUTH_AUTH_USERS=user:$$2a$$10$$UdLYoJ5lgPsC0RKqYH/jMua7zIn0g9kPqWmhYayJYLaZQ/FTmH2/u # user:password
    volumes:
      - ./data:/data
